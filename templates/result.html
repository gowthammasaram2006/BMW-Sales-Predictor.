<!-- templates/result.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prediction Result</title>
  <link href="/static/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:white; }
    .container { max-width:980px; margin-top:24px; }
    .pred-number { color:#0d6efd; font-weight:700; font-size:2.2rem; }
    .chart-card { padding:18px; background:#fff; border-radius:8px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="container text-center">
    <h1 class="display-5 text-primary">📊 Prediction Result</h1>
    <p class="text-muted">Model: <strong>{{ model }}</strong> | Fuel: <strong>{{ fuel }}</strong> | Transmission: <strong>{{ transmission }}</strong></p>

    <div class="mt-3">
      <h2>Predicted Sales for {{ pred_year }}: <span class="pred-number">{{ predicted }}</span></h2>
      <div class="mt-3">
        <p class="mb-1"><strong>Model performance on test set:</strong></p>
        <p class="small">R²: {{ r2 }} <br> MSE: {{ mse }} <br> RMSE: {{ rmse }}</p>
      </div>
    </div>

    <div class="chart-card mt-4">
      <img src="{{ img_url }}" alt="chart" style="width:100%; border-radius:6px;">
    </div>

    <div class="mt-4">
      <a href="/" class="btn btn-link">← Go Back</a>
    </div>
  </div>
</body>
</html>
